<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G. Rupali | AI Specialist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #030014; --card-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08); --primary: #7000ff; --secondary: #00d4ff; --accent: #ff0055; --text: #fff; --muted: #a1a1aa; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        .ambient-light { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 15% 50%, rgba(112,0,255,0.15), transparent 40%), radial-gradient(circle at 85% 30%, rgba(0,212,255,0.15), transparent 40%); animation: pulseLight 10s infinite alternate; }
        @keyframes pulseLight { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 1; transform: scale(1.1); } }

        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; background: var(--bg); transition: opacity 0.8s ease, visibility 0.8s; }
        #intro-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .intro-title { font-family: 'Space Grotesk'; font-size: clamp(3rem, 8vw, 6rem); font-weight: 800; text-align: center; background: linear-gradient(to right, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; transform: translateY(30px); animation: fadeUp 1s forwards 0.5s; }
        .intro-sub { font-size: 1.2rem; color: var(--muted); margin-top: 20px; letter-spacing: 2px; opacity: 0; animation: fadeUp 1s forwards 1s; }
        .enter-btn { margin-top: 40px; padding: 15px 40px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; border-radius: 50px; cursor: pointer; font-family: 'Space Grotesk'; font-size: 1rem; transition: 0.3s; opacity: 0; animation: fadeUp 1s forwards 1.5s; }
        .enter-btn:hover { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 30px rgba(112,0,255,0.5); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .main-wrapper { max-width: 1300px; margin: 0 auto; padding: 100px 20px; opacity: 0; transition: opacity 1s ease 0.5s; }
        .main-wrapper.visible { opacity: 1; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        .widget { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .widget:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .w-profile { grid-column: span 2; grid-row: span 2; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(145deg, rgba(112,0,255,0.1), rgba(0,0,0,0)); }
        .w-patent { grid-column: span 2; background: linear-gradient(145deg, rgba(0,212,255,0.05), rgba(0,0,0,0)); border-color: rgba(0,212,255,0.2); }
        .w-edu { grid-column: span 2; }
        .w-skills { grid-column: span 2; }
        .w-projects { grid-column: span 4; }
        .w-certs { grid-column: span 2; }

        h2 { font-family: 'Space Grotesk'; font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        h2 i { color: var(--secondary); }
        
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 30px rgba(112,0,255,0.3); }
        .role-badge { background: rgba(112,0,255,0.2); color: #d8b4fe; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; display: inline-block; }
        
        .patent-number { font-family: 'Space Grotesk'; font-size: 2.5rem; font-weight: 700; color: var(--secondary); margin: 10px 0; text-shadow: 0 0 20px rgba(0,212,255,0.4); }
        .patent-status { display: inline-flex; align-items: center; gap: 5px; background: rgba(0,255,136,0.1); color: #00ff88; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; }
        .inventor-list { font-size: 0.8rem; color: var(--muted); margin-top: 10px; font-style: italic; }
        
        /* ✅ DOWNLOAD BUTTON STYLES */
        .btn-pdf, .btn-resume { display: inline-flex; align-items: center; gap: 8px; margin-top: 15px; padding: 10px 25px; border-radius: 25px; text-decoration: none; font-weight: 600; transition: 0.3s; cursor: pointer; border: none; font-family: inherit; }
        .btn-pdf { background: rgba(0,212,255,0.1); border: 1px solid var(--secondary); color: var(--secondary); font-size: 0.85rem; }
        .btn-pdf:hover { background: var(--secondary); color: var(--bg); }
        .btn-resume { background: var(--accent); color: white; margin-top: 20px; }
        .btn-resume:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,0,85,0.4); }

        .edu-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
        .edu-degree { font-weight: 600; font-size: 1rem; }
        .edu-school { color: var(--muted); font-size: 0.85rem; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .tag:hover { background: var(--primary); border-color: var(--primary); }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .folder-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px; cursor: pointer; transition: 0.3s; text-decoration: none; color: inherit; display: block; }
        .folder-card:hover { background: rgba(255,255,255,0.06); border-color: var(--accent); }
        .folder-icon { font-size: 2rem; color: var(--accent); margin-bottom: 15px; }
        
        .cert-item { background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
        .cert-item i { color: var(--secondary); }

        @media (max-width: 1024px) { .bento-grid { grid-template-columns: repeat(2, 1fr); } .w-profile, .w-patent, .w-edu, .w-skills, .w-projects, .w-certs { grid-column: span 2; } }
        @media (max-width: 768px) { .bento-grid { grid-template-columns: 1fr; } .w-profile, .w-patent, .w-edu, .w-skills, .w-projects, .w-certs { grid-column: span 1; } .intro-title { font-size: 3rem; } }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div id="intro-screen">
        <h1 class="intro-title">G. RUPALI</h1>
        <p class="intro-sub">AI SPECIALIST • RESEARCHER • INVENTOR</p>
        <button class="enter-btn" onclick="enterSite()">ENTER PORTFOLIO</button>
    </div>

    <div class="main-wrapper" id="main-content">
        <div class="bento-grid">
            <div class="widget w-profile" id="profile-widget"></div>
            <div class="widget w-patent" id="patent-widget"></div>
            <div class="widget w-edu" id="edu-widget"></div>
            <div class="widget w-skills" id="skills-widget"></div>
            <div class="widget w-projects" id="projects-widget"></div>
            <div class="widget w-certs" id="certs-widget"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function enterSite() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('main-content').classList.add('visible');
        }

        // ✅ FORCE DOWNLOAD FUNCTION (Bypasses GitHub Pages restrictions)
        async function forceDownload(url, filename) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                console.error("Download failed, opening in new tab:", error);
                // Fallback: Open in new tab if download fails
                window.open(url, '_blank');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const d = PORTFOLIO_DATA;

            // ✅ PROFILE WIDGET WITH WORKING CONTACT & RESUME
            document.getElementById('profile-widget').innerHTML = `
                <img src="${d.profile.avatar}" class="avatar" alt="Profile">
                <span class="role-badge">${d.profile.role}</span>
                <h1 style="font-family:'Space Grotesk'; font-size:2.5rem; margin-bottom:10px;">${d.profile.name}</h1>
                <p style="color:var(--muted); max-width:400px; line-height:1.6;">${d.profile.bio}</p>
                
                <div style="margin-top:20px; font-size:0.9rem; color:var(--muted);">
                    <div><i class="fas fa-phone"></i> ${d.profile.contact.phone}</div>
                    <div><i class="fas fa-envelope"></i> ${d.profile.contact.email}</div>
                    <div><i class="fas fa-map-marker-alt"></i> ${d.profile.contact.location}</div>
                </div>

                <div class="tags" style="margin-top:20px; justify-content:center;">
                    ${d.profile.socials.map(s => `<a href="${s.link}" target="_blank" class="tag"><i class="${s.icon}"></i> ${s.label}</a>`).join('')}
                </div>
                
                <button onclick="forceDownload('${d.resumeLink}', 'G_Rupali_Resume.pdf')" class="btn-resume">
                    <i class="fas fa-download"></i> Download Resume
                </button>
            `;

            // ✅ PATENT WIDGET WITH WORKING DOWNLOAD
            document.getElementById('patent-widget').innerHTML = `
                <h2><i class="fas fa-file-contract"></i> Indian Patent Application</h2>
                <div style="text-align:center; padding:10px 0;">
                    <div class="patent-number">${d.patent.number}</div>
                    <h3 style="font-size:1.2rem; margin-bottom:10px;">${d.patent.title}</h3>
                    <p style="color:var(--muted); font-size:0.85rem; margin-bottom:15px; line-height:1.5;">${d.patent.abstract}</p>
                    <div class="patent-status"><i class="fas fa-check-circle"></i> ${d.patent.status} • ${d.patent.date}</div>
                    <div class="inventor-list">Applicants: ${d.patent.applicants.join(", ")}</div>
                    <div class="inventor-list">Inventors: ${d.patent.inventors.join(", ")}</div>
                    <button onclick="forceDownload('${d.patent.pdfLink}', 'Patent_IN202641053225_A1.pdf')" class="btn-pdf">
                        <i class="fas fa-file-pdf"></i> View Full Patent Document
                    </button>
                </div>
            `;

            // Education Widget
            document.getElementById('edu-widget').innerHTML = `
                <h2><i class="fas fa-graduation-cap"></i> Education</h2>
                ${d.education.map(e => `
                    <div class="edu-card">
                        <div class="edu-degree">${e.degree}</div>
                        <div class="edu-school">${e.school} • ${e.year}</div>
                        <div style="font-size:0.8rem; color:var(--muted);">${e.location}</div>
                    </div>
                `).join('')}
            `;

            // Skills Widget
            document.getElementById('skills-widget').innerHTML = `
                <h2><i class="fas fa-microchip"></i> Technical Skills</h2>
                <div class="tags">${d.skills.map(s => `<span class="tag">${s}</span>`).join('')}</div>
            `;

            // Projects Widget
            document.getElementById('projects-widget').innerHTML = `
                <h2><i class="fas fa-layer-group"></i> Project Archives</h2>
                <div class="project-grid">
                    ${d.projects.map(p => `
                        <a href="${p.link}" target="_blank" class="folder-card">
                            <i class="fas fa-folder-open folder-icon"></i>
                            <h3 style="margin-bottom:8px;">${p.title}</h3>
                            <p style="color:var(--muted); font-size:0.85rem; margin-bottom:15px;">${p.desc}</p>
                            <div class="tags">${p.tech.map(t => `<span class="tag" style="font-size:0.7rem; padding:3px 8px;">${t}</span>`).join('')}</div>
                        </a>
                    `).join('')}
                </div>
            `;

            // Certifications Widget
            document.getElementById('certs-widget').innerHTML = `
                <h2><i class="fas fa-certificate"></i> Certifications</h2>
                ${d.certifications.map(c => `
                    <div class="cert-item"><i class="fas fa-check"></i> ${c}</div>
                `).join('')}
            `;
        });
    </script>
</body>
</html>
